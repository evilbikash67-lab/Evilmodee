services:
  - type: web
    name: evil-mod-api
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: ADMIN_PASSWORD
        value: your-super-secret-password
      - key: JWT_SECRET
        value: a-long-random-string
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: CLIENT_URL
        value: https://evil-mod.onrender.com

  - type: static
    name: evil-mod-frontend
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    routes:
      - type: rewrite
        source: /admin-secret-7x9
        destination: /index.html
      - type: rewrite
        source: /*
        destination: /index.html
